services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: loresuelvo-webapp-dev
    ports:
      - "3001:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
