services:
  loresuelvo:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-loresuelvo-webapp-prod}
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: app-network