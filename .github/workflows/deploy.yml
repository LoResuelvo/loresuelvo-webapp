name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: SSH into test droplet and update
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/loresuelvo-webapp
            git fetch --tags --force
            git checkout ${{ github.ref_name }}
            export IMAGE_TAG=${{ github.ref_name }}
            docker compose -f compose.test.yml pull
            docker compose -f compose.test.yml --env-file .env.test up -d
            docker image prune -f

  deploy-production:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH into production droplet and update
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/loresuelvo-webapp
            git fetch --tags --force
            git checkout ${{ github.ref_name }}
            export IMAGE_TAG=${{ github.ref_name }}
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml --env-file .env.production up -d
            docker image prune -f
