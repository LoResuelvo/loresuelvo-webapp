name: CI Build & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build y Verificar
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar browsers de Playwright
        run: npx playwright install --with-deps

      - name: Preparar variables de entorno
        run: cp .env.example .env

      - name: Levantar servidor Next.js en background
        run: npm run dev &

      - name: Esperar que el servidor esté disponible
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Ejecutar Linter y Pruebas
        run: |
          make lint
          make test-all-once

      - name: Construir Next.js
        run: make build

      - name: Construir la imagen de producción
        run: docker build -t loresuelvo-webapp-ci .
